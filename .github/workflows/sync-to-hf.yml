name: Sync to Hugging Face Space
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: push to HF Space
        run: |
          git remote add space https://huggingface.co/spaces/LocalAIPrototype/AI0
          git push --force https://$HF_TOKEN@huggingface.co/spaces/LocalAIPrototype/AI0 main
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
